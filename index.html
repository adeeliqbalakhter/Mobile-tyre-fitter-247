    <!--
      Google Consent Mode v2 (EU/GDPR).
      Consent defaults to DENIED for all non-essential storage until the visitor
      opts in via the cookie banner. This block must run before any Google tag.
    -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() { dataLayer.push(arguments); }
      window.gtag = gtag;
      gtag('consent', 'default', {
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied',
        analytics_storage: 'denied',
        functionality_storage: 'granted',
        security_storage: 'granted',
        wait_for_update: 500
      });
      // Privacy-safe Google Ads measurement while consent is denied.
      gtag('set', 'url_passthrough', true);
      gtag('set', 'ads_data_redaction', true);
      // Re-apply a returning visitor's saved choice as early as possible.
      try {
        var saved = JSON.parse(localStorage.getItem('cookie-consent') || 'null');
        if (saved && saved.consent) { gtag('consent', 'update', saved.consent); }
      } catch (e) {}
    </script>
